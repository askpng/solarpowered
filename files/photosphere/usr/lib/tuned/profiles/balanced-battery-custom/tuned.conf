[main]
summary=Custom balanced battery profile

[cpu]
priority=10
governor=schedutil|ondemand|powersave
energy_perf_bias=normal
energy_performance_preference=balance_power
boost=0

[acpi]
platform_profile=balanced

[audio]
timeout=1

[video]
panel_power_savings=3

[sysctl]
vm.dirty_writeback_centisecs=1500
kernel.nmi_watchdog=0

[sysfs]
# Runtime PM for PCI Device Intel Corporation Ice Lake-LP USB 3.1 xHCI Host Controller 
/sys/bus/pci/devices/0000:00:14.0/power/control=auto

# Runtime PM for PCI Device Intel Corporation Ice Lake-LP DRAM Controller 
/sys/bus/pci/devices/0000:00:14.2/power/control=auto

# Runtime PM for PCI Device Intel Corporation Ice Lake-LP Processor Host Bridge/DRAM Registers 
/sys/bus/pci/devices/0000:00:00.0/power/control=auto

# Runtime PM for PCI Device Intel Corporation Ice Lake-LP SPI Controller 
/sys/bus/pci/devices/0000:00:1f.5/power/control=auto

# Runtime PM for PCI Device Intel Corporation Ice Lake-LP PCH CNVi WiFi 
/sys/bus/pci/devices/0000:00:14.3/power/control=auto

# Runtime PM for PCI Device Intel Corporation Ice Lake-LP LPC Controller 
/sys/bus/pci/devices/0000:00:1f.0/power/control=auto

# Runtime PM for PCI Device Intel Corporation Processor Power and Thermal Controller 
/sys/bus/pci/devices/0000:00:04.0/power/control=auto

# Wake-on-lan status for device wlan0 
/sys/class/net/wlan0/device/power/wakeup=enabled

# Wake status for USB device usb3 
/sys/bus/usb/devices/usb3/power/wakeup=enabled

# Wake status for USB device usb1 
/sys/bus/usb/devices/usb1/power/wakeup=enabled

# Wake status for USB device usb4 
/sys/bus/usb/devices/usb4/power/wakeup=enabled

# Wake status for USB device 3-10 
/sys/bus/usb/devices/3-10/power/wakeup=enabled

# Wake status for USB device usb2 
/sys/bus/usb/devices/usb2/power/wakeup=enabled

# CUSTOM

# TDP1 12W / TDP2 15W
/sys/class/powercap/intel-rapl:0/constraint_0_power_limit_uw=12000000
/sys/class/powercap/intel-rapl:0/constraint_1_power_limit_uw=15000000

# Set TCC offset to 30 (100-30=70)
/sys/bus/pci/devices/0000:00:04.0/tcc_offset_degree_celsius=30