# tuned config

[main]
summary=Custom balanced profile

[cpu]
priority=10
governor=powersave
energy_preference_performance=balance_performance
boost=1

[acpi]
platform_profile=balanced

[audio]
timeout=0

[sysctl]
vm.swappiness = 180

[video]
radeon_powersave=dpm-balanced, auto
panel_power_savings=0

[scsi_host]
alpm=medium_power

[script]
script=${i:PROFILE_DIR}/script.sh
