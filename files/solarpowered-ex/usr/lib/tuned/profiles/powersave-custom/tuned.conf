# tuned configuration

[main]
summary=Custom powersave profile

[cpu]
governor=powersave
energy_performance_preference=balance_power
boost=0

[acpi]
platform_profile=low-power|quiet

[audio]
timeout=0

[disk]
# Comma separated list of devices, all devices if commented out.
# devices=sda

[net]
# Comma separated list of devices, all devices if commented out.
# devices=eth0

[scsi_host]
alpm=min_power

[script]
script=${i:PROFILE_DIR}/script.sh
