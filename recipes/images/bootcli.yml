---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

# enter image name here
name: bootc-iso
# enter image description here
description: bootcli image for in-house testing

# this template is for use with
# shared/base.yml

# defines base image
# ---
base-image: quay.io/fedora/fedora-bootc

# defines image major version
# ---
image-version: 42

modules:
  - type: dnf
    source: ghcr.io/blue-build/modules/dnf:dnf-module
    repos:
      cleanup: true
      copr:
        - shdwchn10/AllTheTools      
    # group-install:
    #   install-weak-deps: false
    #   packages:
    #     - gnome-desktop
    install:
      install-weak-deps: false
      skip-unavailable: true
      packages:
        # gnome
        - avahi
        - fprintd-pam
        - gdm
        - gnome-bluetooth
        - gnome-control-center
        - gnome-shell
        - gnome-session-wayland-session
        - gnome-settings-daemon
        - nautilus
        - ModemManager
        - NetworkManager
        - PackageKit-gtk3-module 
        - polkit
        - ptyxis
        - xdg-desktop-portal
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - xdg-user-dirs-gtk        
        # etc
        - fish
        - fzf
        - git
        - lm_sensors
        - lzip
        - perl-Clipboard
        - squashfs-tools
        - spice-webdavd
        - starship
        - symlinks
        - tcpdump
        - topgrade
        - traceroute
        - wget
        - wireguard-tools
        - wl-clipboard
        - zstd

  - type: systemd
    system:
      enabled:
        - gdm.service

  - type: dnf
    source: ghcr.io/blue-build/modules/dnf:dnf-module
    repos:
      cleanup: true
      nonfree: negativo17
    install:
      packages:
        from-repo: fedora-multimedia
        allow-erasing: true
        packages:
          - libheif
          - mesa-va-drivers
          - mesa-vulkan-drivers
    replace:
      - from-repo: fedora-multimedia
        packages:
          - old: ffmpeg-free
            new: ffmpeg
          - old: libavcodec-free
            new: libavcodec
          - old: libfdk-aac-free
            new: libfdk-aac
          - old: intel-media-driver
            new: libva-intel-media-driver
          - libva
          - mesa-dri-drivers
          - mesa-filesystem
          - mesa-libEGL
          - mesa-libGL
          - mesa-libgbm

  - type: signing
