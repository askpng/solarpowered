---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: solarpowered-moonlight
# description will be included in the image's metadata
description: Simple image that runs Moonlight and Syncthing on older Intel PCs. Features Epiphany. Uses Cage.

# the base image to build on top of (FROM) and the version tag to use
base-image: quay.io/fedora/fedora-bootc
image-version: 42 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: dnf
    install:
      allow-erasing: true
      install-weak-deps: false
      skip-unavailable: true
      packages:
        - dnf5-plugins # to prevent failure in the following step

  - type: dnf
    repos:
      cleanup: true
      copr:
        - abn/throttled
        - ferdiu/moonlight    
        - secureblue/trivalent
      files:
        - https://repo.secureblue.dev/secureblue.repo  
      nonfree: rpmfusion # for libva-intel-driver as fedora-multimedia doesn't seem to ship older intel drivers
    replace:
      - from-repo: rpmfusion
        packages:
        - old: ffmpeg-free
          new: ffmpeg
        - old: mesa-va-drivers
          new: mesa-va-drivers-freeworld
        - old: libavcodec
          new: libavcodec-freeworld
    install:
      install-weak-deps: false
      packages:
        - mesa-vulkan-drivers
        - vulkan-loader
        - vulkan-headers
        - pipewire-plugin-vulkan
        - vulkan-tools
        - gstreamer1-plugin-dav1d
        - gstreamer1-plugin-libav
        - gstreamer1-plugins-base
        - gstreamer1-plugins-good
        - gstreamer1-plugins-good-qt
        - gstreamer1-plugins-bad-freeworld
        - gstreamer1-plugins-ugly
        - gstreamer1-vaapi
        - libva
        - libva-intel-driver
        # htpc packages
        # essentials
        - cage # to run moonlight
        - fish # MY SHELL
        - grim
        - lm_sensors
        - moonlight-qt
        - python3-evdev        
        - seatd # shit goes wrong without this around
        - syncthing
        # bt pad
        - bluez # just to make sure it exists
        - evtest
        # CJK fonts
        - google-noto-serif-cjk-vf-fonts
        - google-noto-sans-mono-cjk-vf-fonts
        # audio/video utils
        - pipewire
        - pipewire-utils
        - pipewire-pulseaudio
        - pipewire-alsa
        - pulseaudio-utils
        - libva-utils
        - wireplumber
        # gamescope
        # - sddm
        - gamescope
        - steam
        # misc
        - cockpit
        - epiphany
        - trivalent
        - trivalent-subresource-filter
        # - easyeffects
        - firewall-config   
        - throttled
        # some deps
        ## appimage
        - fuse
        - ifuse
        ## cage & moonlight
        - libxcb
        - qt6-qtwayland
        - xdg-user-dirs
        - xwayland-run
        ## flex-launcher
        - SDL2
        - SDL2_image
        - SDL2_ttf
        ## deps for flex-launcher build
        - SDL2-devel
        - SDL2_image-devel
        - SDL2_ttf-devel
        - inih-devel
        - automake
        - make
        - cmake
        - gcc-c++
        - git           

  - type: script
    snippets:
      # flex-launcher
      - git clone https://github.com/complexlogic/flex-launcher.git /tmp/flex-launcher && mkdir -p /tmp/flex-launcher/build
      - cd /tmp/flex-launcher/build
      - cmake /tmp/flex-launcher -DCMAKE_BUILD_TYPE=Release && make install
      - rm -r /tmp/flex-launcher 
      - mv /usr/local/share/flex-launcher/config.ini /usr/local/share/flex-launcher/config_default.ini
      # appimages
      - curl -fLs https://github.com/shy1132/VacuumTube/releases/latest/download/VacuumTube-x86_64.AppImage -o /tmp/vacuumtube.AppImage
      - cp /tmp/vacuumtube.AppImage /usr/bin/vacuumtube.AppImage && chmod 0755 /usr/bin/vacuumtube.AppImage
      - ln -s /usr/bin/vacuumtube.AppImage /usr/bin/vacuumtube
      - rm /tmp/vacuumtube.AppImage   
      # bluetui
      - "VER=$(basename $(curl -Ls -o /dev/null -w %{url_effective} https://github.com/pythops/bluetui/releases/latest)) && curl -fLs https://github.com/pythops/bluetui/releases/download/${VER}/bluetui-x86_64-linux-gnu  -o /tmp/bluetui"
      - cp /tmp/bluetui /usr/bin/bluetui && chmod 0755 /usr/bin/bluetui
      - rm /tmp/bluetui
      # just... in case
      - "VER=$(basename $(curl -Ls -o /dev/null -w %{url_effective} https://github.com/casey/just/releases/latest)) && curl -fLs --create-dirs https://github.com/casey/just/releases/download/${VER}/just-${VER}-x86_64-unknown-linux-musl.tar.gz -o /tmp/just-x86_64-unknown-linux-musl.tar.gz"
      - "mkdir -p /tmp/just && tar -xzf /tmp/just-x86_64-unknown-linux-musl.tar.gz -C /tmp/just/"
      - cp /tmp/just/just /usr/bin/just && chmod 0755 /usr/bin/just
      - cp /tmp/just/completions/just.bash /usr/share/bash-completion/completions/just
      - cp /tmp/just/completions/just.fish /usr/share/fish/completions/just.fish
      - rm /tmp/just-x86_64-unknown-linux-musl.tar.gz
      - rm -r /tmp/just/
      # swingmusic
      - "VER=$(basename $(curl -Ls -o /dev/null -w %{url_effective} https://github.com/swingmx/swingmusic/releases/latest)) && curl -fLs https://github.com/swingmx/swingmusic/releases/download/${VER}/swingmusic_linux_amd64 -o /tmp/swingmusic"
      - cp /tmp/swingmusic /usr/bin/swingmusic && chmod 0755 /usr/bin/swingmusic
      - rm /tmp/swingmusic
  
  - type: dnf
    remove:
      packages:
        # remove deps for flex-launcher build
        - SDL2-devel
        - SDL2_image-devel
        - SDL2_ttf-devel
        - inih-devel
        - automake
        - make
        - cmake
        - gcc-c++

  - type: files
    files:
      - source: solarpowered-moonlight
        destination: /

  - type: systemd
    user:
      enabled:
        # enables sound
        - pipewire.service
        - pipewire-pulse.service
        - wireplumber.service
        # autolaunch moonlight in cage
        # - moonlight-in-cage.service # todo
        # autolaunch swing music
        # - swingmusic.service # todo
    system:
      # disabled:
        # - getty@$tty1.service # todo
      enabled:
        # autologin
        # - autologin@$(whoami).service # todo
        - cockpit.socket
        - seatd.service   
  
  - type: signing