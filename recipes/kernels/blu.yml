modules:
  - type: script
    # scripts:
    snippets:
      - dnf -y install --setopt=install_weak_deps=False dnf-plugins-core
      - dnf -y config-manager setopt install_weak_deps=False
      - dnf -y config-manager setopt tsflags=noscripts
      - dnf -y remove kernel kernel* && rm -r -f /usr/lib/modules/*
      - dnf -y config-manager setopt "updates*".exclude="
          kernel
          kernel-core
          kernel-modules
          kernel-modules-core
          kernel-modules-extra
          kernel-devel
          kernel-headers
          " 
      - dnf -y copr enable sentry/kernel-blu
      - curl -L https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo -o /etc/yum.repos.d/terra.repo
      - dnf -y install
          kernel
          kernel-devel
          kernel-modules-extra
          akmods        
          help2man
          ryzen_smu
          v4l2loopback
          zenergy
      - VER=$(ls /lib/modules) &&
          akmods --force --kernels $VER --kmod v4l2loopback &&
          akmods --force --kernels $VER --kmod zenergy && 
          depmod -a $VER &&
          dracut --kver $VER --force --add ostree --no-hostonly --reproducible /usr/lib/modules/$VER/initramfs.img
      - dnf -y config-manager unsetopt tsflags
      - dnf -y copr disable sentry/kernel-blu
      - rm -f /etc/yum.repos.d/terra.repo