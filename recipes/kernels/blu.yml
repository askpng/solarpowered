    source: ghcr.io/blue-build/modules/dnf:dnf-module
    repos:
      cleanup: true
      copr:
        - sentry/kernel-blu
    replace:
        skip-unavailabe: true
        from-repo: copr:copr.fedorainfracloud.org:sentry:kernel-blu
        packages:
        - kernel
        - kernel-core
        - kernel-headers
        - kernel-modules
        - kernel-modules-core
        - kernel-modules-extra

