modules:
  - type: script
    snippets:
    - dnf -y install --setopt=install_weak_deps=False dnf-plugins-core
    - dnf -y config-manager setopt install_weak_deps=False
    - dnf -y config-manager setopt tsflags=noscripts # Prevents postinstall scripts from running (and failing the build)
    - dnf -y remove kernel kernel-* && rm -r -f /usr/lib/modules/* # Remove Fedora kernel & leftovers if any
    - dnf -y copr enable bieszczaders/kernel-cachyos-lto
    - dnf -y copr enable bieszczaders/kernel-cachyos-addons
    - curl -L https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo -o /etc/yum.repos.d/terra.repo
    - dnf -y install
        kernel-cachyos-lto
        kernel-cachyos-lto-devel
        scx-scheds
        scx-tools
        scx-manager        
        akmods
        ryzen_smu
        zenergy
    - dnf -y swap zram-generator-defaults cachyos-settings
    - VER=$(basename /usr/lib/modules/*) &&
        akmods --force --kernels $VER --kmod ryzen_smu &&
        akmods --force --kernels $VER --kmod zenergy &&
        depmod -a $VER &&
        DRACUT_NO_XATTR=1 &&
        dracut --kver $VER --force --add ostree --no-hostonly --reproducible /usr/lib/modules/$VER/initramfs.img
    - dnf -y config-manager unsetopt tsflags # Cleanly undo tsflags=noscripts
    - dnf -y copr disable bieszczaders/kernel-cachyos-lto
    - dnf -y copr disable bieszczaders/kernel-cachyos-addons    
    - rm -f /etc/yum.repos.d/terra.repo
  - type: systemd
    system:
      enabled:
      - scx_loader.service