modules:
  - type: dnf
    repos:
      cleanup: true
      # nonfree: negativo17
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo
        # - vscodium.repo        
      copr:
        - atim/starship
        - cuteneko/waydroid-helper
        - sneexy/zen-browser
        - starfish/howdy-beta
        - zeno/scrcpy
    #     - trixieua/mutter-patched
    # replace:
    #   - from-repo: fedora
    #     packages:
    #       - old: OpenCL-ICD-Loader
    #         new: ocl-icd
    #   - from-repo: copr:copr.fedorainfracloud.org:trixieua:mutter-patched
    #     allow-erasing: true
    #     packages:
    #       - gdm
    #       - gnome-shell
    #       - mutter
    #       - mutter-common
    install:
      allow-erasing: true
      install-weak-deps: false
      packages:
        # copr
        - howdy-gtk
        - scrcpy
        - starship
        - topgrade
        - zen-browser
        ## vscodium
        - codium
        # audio & codecs
        - alsa-firmware
        - ffmpegthumbnailer
        - libcamera-gstreamer
        - libcamera-tools
        - pipewire-plugin-vulkan
        - vulkan-headers
        # CLI utilities
        - clevis
        - distrobox
        - efivar
        - fastfetch
        - fakeroot
        - fish
        - fzf
        - ifuse
        - igt-gpu-tools
        - inxi
        - iwd
        - lm_sensors
        - lzip
        - micro
        - nvtop
        - podlet
        - powertop
        - smartmontools
        - stress
        - s-tui
        - tailscale
        - tuned-utils
        - yt-dlp
        # GUI
        - baobab
        - firewall-config
        - nautilus-python
        - papers
        # other system
        - btrfs-assistant
        - flatpak-spawn
        - input-remapper
        - libappindicator
        - libratbag-ratbagd
        - microcode_ctl
        - openrgb-udev-rules
        - steam-devices
        # waydroid/android
        - android-tools
        - bindfs
        - python3-pyclip
        - python3-aiofiles
        - python3-cffi
        - python3-ply
        - python3-pycparser
        - python3-pywayland
        - waydroid
        - repo: copr:copr.fedorainfracloud.org:cuteneko:waydroid-helper
          packages:
            - waydroid-helper   
        # cosmetics
        - adw-gtk3-theme
        - fonts-tweak-tool
        - deepin-sound-theme
        - oxygen-sounds
        - pop-sound-theme
        - yaru-sound-theme     
    remove:
      packages:
        # fedora
        # repos are also removed because the image will not be used to layer things locally
        - fedora-bookmarks
        - fedora-chromium-config
        - fedora-chromium-config-gnome
        - fedora-flathub-remote
        - fedora-repos-archive
        - fedora-third-party
        - fedora-workstation-repositories
        - fedora-workstation-backgrounds
        # ---
        # gnome
        - gnome-classic-session
        - gnome-shell-extension-apps-menu
        - gnome-shell-extension-background-logo
        - gnome-shell-extension-launch-new-instance
        - gnome-shell-extension-places-menu
        - gnome-shell-extension-window-list
        - gnome-software
        - gnome-software-rpm-ostree
        - gnome-system-monitor
        - gnome-tour
        - totem-video-thumbnailer   
        # ---
        # others
        - default-fonts-cjk-sans
        - firefox
        - firefox-langpacks
        - google-noto-sans-cjk-vf-fonts        
        - rygel
        - yelp
