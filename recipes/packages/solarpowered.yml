modules:
  - type: rpm-ostree
    repos:
      # abn/throttled for F41
      - https://copr.fedorainfracloud.org/coprs/abn/throttled/repo/fedora-rawhide/abn-throttled-fedora-rawhide.repo
      # sneexy/python-validity
      - https://copr.fedorainfracloud.org/coprs/sneexy/python-validity/repo/fedora-rawhide/sneexy-python-validity-fedora-rawhide.repo
    install:
      - igt-gpu-tools
      # python-validity
      - fprintd-clients
      - fprintd-clients-pam
      - open-fprintd
      - python3-validity    
      # tlp
      - tlp
      - tlp-rdw
      # throttled
      - throttled
      # zcfan
      - zcfan
    remove:
      # python-validity conflicts
      - fprintd
      - fprintd-pam
      # throttled-conflicts
      - thermald
      # tlp conflicts
      - tuned-ppd
      - tuned

  - type: systemd
    system:
      enabled:
        # tlp
        - tlp.service
        # throttled
        # throttled.service
      masked: 
        # tlp
        - systemd-rfkill.service
        - systemd-rfkill.socket