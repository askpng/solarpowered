modules:
  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
    install:
      allow-erasing: true
      install-weak-deps: false
      packages:
        - ffmpeg-libs
        - gstreamer1-plugins-bad
        - gstreamer1-plugins-bad-fluidsynth
        - gstreamer1-plugins-bad-opencv
        - gstreamer1-plugins-ugly
        - intel-gmmlib
        - openh264
        - libfreeaptx
        - mesa-va-drivers
        - mesa-vulkan-drivers
        - x264
        - x265  
    replace:
      - from-repo: fedora-multimedia
        packages:
          # - old: ffmpeg-free
          #   new: ffmpeg
          # - old: libavcodec-free
          #   new: libavcodec
          - old: libfdk-aac-free
            new: libfdk-aac
          - libheif
          - libva
          - libva-intel-media-driver
          - mesa-dri-drivers
          - mesa-filesystem
          - mesa-libEGL
          - mesa-libGL
          - mesa-libgbm
          - mesa-vulkan-drivers